# NOTE: This project has been migrated from PostgreSQL to MySQL.
# Ensure the Railway MySQL plugin is provisioned and DATABASE_URL is updated accordingly.

# File: railway.toml
# Purpose: Railway deployment configuration for the Express.js backend.

[build]
builder = "NIXPACKS"
buildCommand = "cd backend && npm ci && npx prisma generate"

[deploy]
startCommand = "cd backend && npx prisma migrate deploy && node src/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[service]
internalPort = 3001
