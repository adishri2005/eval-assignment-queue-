# File: .github/workflows/ci.yml
# Purpose: CI pipeline — lint, build, and test on push/PR to main.
#          Uses MySQL 8 service container for integration tests.

name: EAQ CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ===========================================================================
  # Job 1: Lint and Build
  # ===========================================================================
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # --- Backend ---
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Lint backend
        working-directory: backend
        run: npm run lint --if-present

      # --- Frontend ---
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check (frontend)
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build Next.js
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
        run: npm run build

  # ===========================================================================
  # Job 2: Test (with MySQL 8 service)
  # ===========================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-build

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: eaq_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: "mysql://root:root@127.0.0.1:3306/eaq_test"
      JWT_SECRET: "ci-test-secret-key"
      PORT: 3001
      CORS_ORIGIN: "http://localhost:3000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run Prisma migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Seed database
        working-directory: backend
        run: npx prisma db seed

      - name: Run Jest tests with coverage
        working-directory: backend
        run: npm test -- --coverage --ci --forceExit

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7
